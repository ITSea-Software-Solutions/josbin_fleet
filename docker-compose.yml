services:

  # ─── MySQL Database ────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: josbin_fleet_ms_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: josbin_fleet_ms
      MYSQL_USER: josbin_fleet_ms
      MYSQL_PASSWORD: josbin_fleet_ms
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "josbin_fleet_ms", "-pjosbin_fleet_ms"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── phpMyAdmin ───────────────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: josbin_fleet_ms_phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_USER: josbin_fleet_ms
      PMA_PASSWORD: josbin_fleet_ms
    ports:
      - "8081:80"

  # ─── Laravel Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: josbin_fleet_ms_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_NAME: Josbin_Fleet_MS
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      APP_KEY: ${APP_KEY:-}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: josbin_fleet_ms
      DB_USERNAME: josbin_fleet_ms
      DB_PASSWORD: josbin_fleet_ms
      CACHE_STORE: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
      MAIL_MAILER: smtp
      MAIL_HOST: ${MAIL_HOST:-smtp.mailtrap.io}
      MAIL_PORT: ${MAIL_PORT:-2525}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@josbin.sr}
      FLEET_ADMIN_EMAIL: ${FLEET_ADMIN_EMAIL:-admin@josbin.sr}
      FLEET_ADMIN_WHATSAPP: ${FLEET_ADMIN_WHATSAPP:-}
      TWILIO_SID: ${TWILIO_SID:-}
      TWILIO_TOKEN: ${TWILIO_TOKEN:-}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM:-+14155238886}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html

  # ─── React Frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000/api
    container_name: josbin_fleet_ms_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  mysql_data:
